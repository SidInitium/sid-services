<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/jpeg" href="logo.jpg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050810; }
    iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <audio id="bg-music" src="bjorns-anvil.mp3" loop preload="none"></audio>
  <iframe id="main-frame" name="main" src="home.html"></iframe>
  <script>
    var audio = document.getElementById('bg-music');
    var frame = document.getElementById('main-frame');
    var playing = false;

    window.addEventListener('message', function(e) {
      if (!e.data || !e.data.type) return;
      if (e.data.type === 'music_toggle') {
        if (!playing) { audio.play().catch(function(){}); playing = true; }
        else { audio.pause(); playing = false; }
        notify();
      } else if (e.data.type === 'music_get') {
        notify();
      }
    });

    frame.addEventListener('load', function() { notify(); });

    function notify() {
      try { frame.contentWindow.postMessage({ type: 'music_state', playing: playing }, '*'); } catch(e) {}
    }
  </script>
</body>
</html>
